site_name: crmeb_doc

fetch:
  headless: true
  timeout_ms: 45000
  wait_until: domcontentloaded
  wait_selector: "#contentContainer"
  wait_for_text_selector: "#contentContainer"
  wait_for_text_min_length: 20
  auto_scroll: false
  delay_after_load_ms: 1200

extract:
  type: article
  title_selector: h1
  content_selector: "#contentContainer"
  remove_selectors:
    - ".right_mulu"
    - ".comment-box"
    - ".isSupport"
    - ".box-handle"
  use_trafilatura_fallback: true

output:
  save_html: true
  save_markdown: true
  save_json: true
  save_screenshot: true
