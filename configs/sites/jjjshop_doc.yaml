site_name: jjjshop_doc

fetch:
  headless: true
  timeout_ms: 45000
  wait_until: domcontentloaded
  wait_selector: "#preview-only-preview"
  wait_for_text_selector: "#preview-only-preview"
  wait_for_text_min_length: 5
  auto_scroll: false
  delay_after_load_ms: 1500

extract:
  type: article
  title_selector: ".wdbox .bt h4"
  content_selector: "#preview-only-preview"
  remove_selectors:
    - ".left-menu-wrapper"
    - ".common-header"
  use_trafilatura_fallback: true

output:
  save_html: true
  save_markdown: true
  save_json: true
  save_screenshot: true
